<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lins Training - Avaliação de Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .header-black { background-color: #000; color: #fff; }
    </style>
</head>
<body>
    <div class="header-black p-6 text-center shadow-lg">
        <h1 class="text-3xl font-bold tracking-widest">LINS TRAINING</h1>
        <p class="text-sm uppercase tracking-wider opacity-80">Performance & Legacy</p>
    </div>

    <div class="max-w-2xl mx-auto mt-8 p-6 bg-white rounded-xl shadow-md">
        <h2 class="text-xl font-semibold border-b pb-2 mb-4">Avaliação de Atleta</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nome do Atleta</label>
                <input type="text" class="w-full border p-3 rounded-lg mt-1" placeholder="Ex: João Silva">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Potência (W)</label>
                    <input type="number" class="w-full border p-3 rounded-lg mt-1">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Velocidade (km/h)</label>
                    <input type="number" class="w-full border p-3 rounded-lg mt-1">
                </div>
            </div>

            <button onclick="alert('Relatório Gerado com Sucesso!')" class="w-full bg-black text-white p-4 rounded-lg font-bold mt-6 hover:bg-gray-800 transition">
                GERAR RELATÓRIO DE PERFORMANCE
            </button>
        </div>
    </div>
</body>
</html>
